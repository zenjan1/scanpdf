name: scanpdf
description: A powerful document scanner app with OCR, PDF generation, and cloud sync. Inspired by CamScanner.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.6.0
  injectable: ^4.2.1
  
  # Routing
  go_router: ^12.1.1
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # Camera & Image
  camera: ^1.0.5
  image_picker: ^1.0.4
  image_cropper: ^7.0.0
  
  # Image Processing
  image: ^4.1.3
  opencv_4: ^1.2.0
  
  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0
  
  # OCR - Google ML Kit
  google_mlkit_text_recognition: ^0.10.0
  google_mlkit_document_scanner: ^0.2.0
  
  # Storage
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  
  # Network
  dio: ^5.4.0
  http: ^1.1.0
  
  # File Management
  file_picker_cross: ^4.4.3
  share_plus: ^7.2.1
  
  # Utilities
  uuid: ^4.2.1
  intl: ^0.18.1
  logger: ^2.0.2
  permission_handler: ^11.0.1
  connectivity_plus: ^5.0.2
  
  # Cloud Storage (Optional)
  firebase_core: ^2.24.2
  firebase_storage: ^11.5.6
  firebase_auth: ^4.15.3
  google_sign_in: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
