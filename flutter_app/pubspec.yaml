name: scanpdf
description: A powerful document scanner app with OCR, PDF generation, and cloud sync. Inspired by CamScanner.
publish_to: 'none'
version: 1.4.2+8

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.0

  # Routing
  go_router: ^12.1.1

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # Image Processing
  image: ^4.1.3

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # OCR
  google_mlkit_text_recognition: ^0.11.0

  # Storage
  path: ^1.8.3
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0

  # Network
  http: ^1.1.0
  dio: ^5.4.0

  # File Management
  file_picker: ^6.1.1
  share_plus: ^7.2.1

  # Utilities
  uuid: ^4.2.1
  intl: ^0.19.0
  permission_handler: ^11.1.0
  package_info_plus: ^5.0.1
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  # Assets are optional - Material Icons are used throughout the app
  # Add asset directories here when you add images/icons:
  # assets:
  #   - assets/images/
  #   - assets/icons/
