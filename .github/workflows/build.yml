name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.3.0)'
        required: false
        default: ''

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  # ─── Android + Web + Linux on Ubuntu ───
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev pkg-config

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Android APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Build Web
        working-directory: flutter_app
        run: flutter build web --release

      - name: Build Linux
        working-directory: flutter_app
        run: flutter build linux --release

      - name: Package Linux bundle
        working-directory: flutter_app/build/linux/x64/release
        run: tar czf scanpdf-linux-x64.tar.gz bundle/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            flutter_app/build/app/outputs/flutter-apk/app-release.apk
            flutter_app/build/linux/x64/release/scanpdf-linux-x64.tar.gz
            flutter_app/build/web/

  # ─── Windows on Windows ───
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Windows
        working-directory: flutter_app
        run: flutter build windows --release

      - name: Package Windows bundle
        working-directory: flutter_app/build/windows/x64/runner/Release
        run: |
          7z a scanpdf-windows-x64.zip *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: flutter_app/build/windows/x64/runner/Release/scanpdf-windows-x64.zip

  # ─── macOS on macOS ───
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build macOS
        working-directory: flutter_app
        run: flutter build macos --release

      - name: Package macOS app
        working-directory: flutter_app/build/macos/Build/Products/Release
        run: |
          # Create DMG
          hdiutil create -volname "ScanPDF" -srcfolder "scanpdf.app" -ov -format UDZO scanpdf-macos.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: flutter_app/build/macos/Build/Products/Release/scanpdf-macos.dmg

  # ─── Create GitHub Release ───
  release:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release_files

          # Android
          cp artifacts/linux-builds/app-release.apk release_files/scanpdf-${{ github.ref_name }}-android.apk

          # Linux
          cp artifacts/linux-builds/scanpdf-linux-x64.tar.gz release_files/scanpdf-${{ github.ref_name }}-linux-x64.tar.gz

          # Web
          cd artifacts/linux-builds/web && zip -r ../../../release_files/scanpdf-${{ github.ref_name }}-web.zip . && cd -

          # Windows
          cp artifacts/windows-builds/scanpdf-windows-x64.zip release_files/scanpdf-${{ github.ref_name }}-windows-x64.zip

          # macOS
          cp artifacts/macos-builds/scanpdf-macos.dmg release_files/scanpdf-${{ github.ref_name }}-macos.dmg

          ls -lh release_files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          generate_release_notes: true
          draft: false
          prerelease: false
