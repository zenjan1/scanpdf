<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanPDF - 智能文档扫描</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }
        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .tagline {
            font-size: 24px;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }
        .btn {
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-primary {
            background: white;
            color: #667eea;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        .btn-secondary:hover {
            background: white;
            color: #667eea;
        }
        .features {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            margin-top: 40px;
        }
        .features h2 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 50px;
            color: #333;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
        }
        .feature-card {
            text-align: center;
            padding: 20px;
        }
        .feature-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .feature-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        .feature-desc {
            color: #666;
            line-height: 1.6;
        }
        footer {
            text-align: center;
            padding: 40px 20px;
            color: white;
            margin-top: 60px;
        }
        footer a {
            color: white;
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .logo { font-size: 36px; }
            .tagline { font-size: 18px; }
            .features { padding: 40px 20px; }
            .features h2 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">📄 ScanPDF</div>
            <div class="tagline">智能文档扫描 · OCR识别 · PDF生成</div>
            <div class="cta-buttons">
                <a href="https://github.com/zenjan1/scanpdf/releases" class="btn btn-primary">下载 APK</a>
                <a href="https://github.com/zenjan1/scanpdf" class="btn btn-secondary">GitHub 源码</a>
            </div>
        </header>

        <div class="features">
            <h2>核心功能</h2>
            <div class="feature-grid">
                <div class="feature-card">
                    <div class="feature-icon">📸</div>
                    <div class="feature-title">智能扫描</div>
                    <div class="feature-desc">自动边缘检测，透视矫正，一键生成清晰文档</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🔍</div>
                    <div class="feature-title">OCR 识别</div>
                    <div class="feature-desc">支持 50+ 语言，准确率超过 95%</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">📄</div>
                    <div class="feature-title">PDF 处理</div>
                    <div class="feature-desc">生成、合并、拆分、压缩 PDF 文件</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">☁️</div>
                    <div class="feature-title">云同步</div>
                    <div class="feature-desc">多设备同步，端到端加密，隐私保护</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🔒</div>
                    <div class="feature-title">隐私优先</div>
                    <div class="feature-desc">本地存储，无广告，无追踪，开源透明</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🌍</div>
                    <div class="feature-title">多平台</div>
                    <div class="feature-desc">Android、iOS、鸿蒙、桌面全平台支持</div>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 ScanPDF. 开源软件，MIT 许可证。</p>
            <p>
                <a href="privacy.html">隐私政策</a> | 
                <a href="https://github.com/zenjan1/scanpdf">GitHub</a> | 
                <a href="mailto:support@scanpdf.zenjan.store">联系我们</a>
            </p>
        </footer>
    </div>
</body>
</html>
